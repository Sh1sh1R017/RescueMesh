name: rescuemesh
description: A new Flutter project for RescueMesh - offline first disaster response.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^2.4.3
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Mapping
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Bluetooth Low Energy Mesh Communication
  flutter_blue_plus: ^1.15.10
  flutter_ble_peripheral: ^3.1.0
  permission_handler: ^11.3.1
  
  # Utilities
  uuid: ^4.2.1
  intl: ^0.18.1

  # UI and Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
